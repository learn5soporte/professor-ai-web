name: Tests

# Workflow separado de deploy-pages.yml a proposito -- si un test falla,
# esto NO debe bloquear ni afectar el deploy a GitHub Pages (que sigue
# siendo su propio job independiente). Esto es solo una señal temprana de
# regresiones en la logica pura (scoring TMAID, gamificacion) para Fase 1.5
# del roadmap tecnico.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test
